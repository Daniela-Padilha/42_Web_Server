server
{
	listen 127.0.0.1:8080;
	server_name localhost;

	error_page 400 files/error_400.html;
	error_page 403 files/error_403.html;
	error_page 404 files/error_404.html;
	error_page 405 files/error_405.html;
	error_page 413 files/error_413.html;
	error_page 500 files/error_500.html;

	client_max_body_size 1M;

	location /
	{
		root YoupiBanane;
		index youpi.bad_extension;
		allow_methods GET;
	}

	location /post_body
	{
		root YoupiBanane;
		allow_methods POST;
		client_max_body_size 100;
	}

	location /directory/
	{
		root YoupiBanane;
		index youpi.bad_extension;
		allow_methods GET POST;
		client_max_body_size 0;
		cgi_extension .bla;
		cgi_path ./cgi_tester;
	}
}
