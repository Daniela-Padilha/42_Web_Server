server
{
	listen 127.0.0.1:8083;
	server_name localhost;

	error_page 403 files/error_403.html;
	error_page 500 files/error_500.html;


	location /
	{
		root files;
		index forbidden.html;
		allow_methods GET;
	}
}

# touch files/forbidden.html
# chmod 000 files/forbidden.html
# curl -i http://127.0.0.1:8083/